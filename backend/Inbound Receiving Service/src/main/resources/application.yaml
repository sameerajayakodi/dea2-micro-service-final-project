# Edit database name, username, password, and host/port below to match your PostgreSQL setup
spring:
  application:
    name: inbound-receiving-service
  datasource:
    url: jdbc:postgresql://inbound-service.cl2yyegaa9ek.ap-southeast-1.rds.amazonaws.com/inbound_service
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /inbound_service
server:
  port: 8090
