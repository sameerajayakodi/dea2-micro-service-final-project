databaseChangeLog:
  - changeSet:
      id: 6-create-worker-storage-location
      author: workforce-service
      changes:
        - createTable:
            tableName: worker_storage_location
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: worker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: storage_location_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: assigned_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: worker_storage_location
            baseColumnNames: worker_id
            referencedTableName: worker
            referencedColumnNames: id
            constraintName: fk_worker_storage_location_worker
