databaseChangeLog:
  - changeSet:
      id: 7-create-worker-order-assignment
      author: workforce-service
      changes:
        - createTable:
            tableName: worker_order_assignment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: worker_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: worker_order_assignment
            baseColumnNames: worker_id
            referencedTableName: worker
            referencedColumnNames: id
            constraintName: fk_worker_order_assignment_worker
