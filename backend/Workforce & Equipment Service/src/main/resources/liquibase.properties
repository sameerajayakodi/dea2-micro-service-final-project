# Liquibase Maven Plugin Configuration
# You can override these via -D flags, e.g.:
#   mvn liquibase:update -Dliquibase.url=jdbc:postgresql://host:5432/db -Dliquibase.username=user -Dliquibase.password=pass

driver=org.postgresql.Driver
url=jdbc:postgresql://localhost:5432/postgres
username=postgres
password=password
changeLogFile=src/main/resources/db/changelog/db.changelog-master.yaml
