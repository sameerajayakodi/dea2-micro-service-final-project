spring.application.name=PICKING-PACKING-SERVICE
# Port
server.port=${SERVER_PORT:8092}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL_LOCAL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME_LOCAL}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD_LOCAL}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Microservice URLs (configure based on your deployment)
order.service.url=${ORDER_SERVICE_URL:http://localhost:8080}
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8081}
worker.service.url=${WORKER_SERVICE_URL:http://localhost:8083}

# Logging
logging.level.com.wms.picking_packing_service=DEBUG
logging.level.org.springframework.web=INFO

# Enable JPA queries logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

# Eureka Client (same registration pattern as Workforce service)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://131.163.97.60:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Eureka Instance
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20