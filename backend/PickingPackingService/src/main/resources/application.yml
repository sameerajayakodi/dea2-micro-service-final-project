spring:
  application:
    name: PICKING-PACKING-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL_LOCAL}
    username: ${SPRING_DATASOURCE_USERNAME_LOCAL}
    password: ${SPRING_DATASOURCE_PASSWORD_LOCAL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${SERVER_PORT:8092}
  address: 0.0.0.0

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://20.116.220.8:8092}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

services:
  order:
    name: ${ORDER_SERVICE_NAME:ORDER-SERVICE}
  inventory:
    name: ${INVENTORY_SERVICE_NAME:PRODUCT-CATALOG-SERVICE}
  worker:
    name: ${WORKER_SERVICE_NAME:CUSTOMER-MANAGEMENT-SERVICE}

logging:
  level:
    com.wms.picking_packing_service: DEBUG
    org.springframework.web: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
    url: /api-docs

eureka:
  client:
    serviceUrl:
      defaultZone: http://131.163.97.60:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:20.116.220.8}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20
