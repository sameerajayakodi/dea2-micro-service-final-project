spring:
  application:
    name: inventory-management-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventory_management_db}
    username: ${DB_USERNAME:wms}
    password: ${DB_PASSWORD:wms}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://131.163.97.60:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    ip-address: ${INSTANCE_IP:35.88.199.189}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 20

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
