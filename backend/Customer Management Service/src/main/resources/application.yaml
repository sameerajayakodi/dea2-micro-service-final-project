spring:
  application:
    name: customer-management-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cmsdb}
    username: ${SPRING_DATASOURCE_USERNAME:cmsuser}
    password: ${SPRING_DATASOURCE_PASSWORD:cmspassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false # recommended for REST APIs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

eureka:
  client:
    service-url:
      defaultZone: http://131.163.97.60:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 18.138.251.174
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always # or when_authorized (if you add security)
      show-components: always # show component names like "db"
      probes:
        enabled: true # optional, for liveness/readiness
